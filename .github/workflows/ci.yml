name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Full Gradle builds are skipped in CI: Minecraft artifact downloads from
  # Mojang/Fabric are slow and unreliable on runners; the mod is built and
  # smoke-tested locally before pushes.
  web:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx tsc --noEmit
        working-directory: web

  worker:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt -r worker/requirements-dev.txt
      - name: Run worker tests
        run: python -m pytest worker/tests -q

  # Compiles the MC-free worldgen code + evaluation tools without Gradle or
  # any Minecraft download — catches noise/cave/river compile breakage fast.
  worldgen-tools:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - run: javac -sourcepath mod/src/main/java -d /tmp/gt-tools mod/tools/*.java
      - run: java -cp /tmp/gt-tools RangeProbe

  datapack-json:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all mod JSON resources
        run: |
          python - <<'EOF'
          import json, pathlib, sys
          bad = []
          for p in pathlib.Path("mod/src/main/resources").rglob("*.json"):
              try:
                  json.loads(p.read_text())
              except ValueError as e:
                  bad.append(f"{p}: {e}")
          if bad:
              print("\n".join(bad))
              sys.exit(1)
          print("all JSON valid")
          EOF
