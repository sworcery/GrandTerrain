<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders — GrandTerrain Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #09090b; color: #e4e4e7; padding: 2rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
        nav { display: flex; gap: 1rem; margin-bottom: 2rem; }
        a { color: #34d399; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .orders { background: #18181b; border: 1px solid #27272a; border-radius: 0.75rem; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.75rem 1rem; text-align: left; }
        th { background: #27272a; font-size: 0.75rem; text-transform: uppercase; color: #a1a1aa; }
        tr:not(:last-child) td { border-bottom: 1px solid #27272a; }
        .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .badge-pending { background: #422006; color: #fbbf24; }
        .badge-generating { background: #172554; color: #60a5fa; }
        .badge-review { background: #3b0764; color: #c084fc; }
        .badge-ready { background: #052e16; color: #34d399; }
        .badge-delivered { background: #1c1917; color: #a8a29e; }
        select { background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46; border-radius: 0.375rem; padding: 0.25rem 0.5rem; font-size: 0.75rem; }
        button { background: #34d399; color: #09090b; border: none; border-radius: 0.375rem; padding: 0.25rem 0.75rem; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #6ee7b7; }
        .notes { font-size: 0.75rem; color: #a1a1aa; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>
    <h1>All Orders</h1>
    <nav>
        <a href="/admin">Dashboard</a>
        <a href="/admin/orders">All Orders</a>
        <a href="/admin/generate">Custom Generate</a>
    </nav>

    <div class="orders">
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Notes</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for order in orders %}
                <tr>
                    <td><code>{{ order.order_id }}</code></td>
                    <td>{{ order.email }}</td>
                    <td><span class="badge badge-{{ order.status }}">{{ order.status }}</span></td>
                    <td class="notes">{{ order.notes or '—' }}</td>
                    <td>{{ order.created_at[:10] }}</td>
                    <td>
                        <select id="status-{{ order.order_id }}">
                            <option value="pending" {% if order.status == 'pending' %}selected{% endif %}>Pending</option>
                            <option value="generating" {% if order.status == 'generating' %}selected{% endif %}>Generating</option>
                            <option value="review" {% if order.status == 'review' %}selected{% endif %}>Review</option>
                            <option value="ready" {% if order.status == 'ready' %}selected{% endif %}>Ready</option>
                            <option value="delivered" {% if order.status == 'delivered' %}selected{% endif %}>Delivered</option>
                        </select>
                        <button onclick="updateStatus('{{ order.order_id }}')">Update</button>
                    </td>
                </tr>
                {% endfor %}
                {% if not orders %}
                <tr><td colspan="6" style="text-align:center;color:#71717a;">No orders yet.</td></tr>
                {% endif %}
            </tbody>
        </table>
    </div>

    <script>
        async function updateStatus(orderId) {
            const status = document.getElementById('status-' + orderId).value;
            const password = prompt('Admin password:');
            if (!password) return;
            const res = await fetch('/admin/orders/' + orderId + '/status?status=' + status, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + password },
            });
            if (res.ok) location.reload();
            else alert('Failed: ' + (await res.text()));
        }
    </script>
</body>
</html>
