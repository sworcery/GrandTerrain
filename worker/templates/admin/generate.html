<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Generate — GrandTerrain Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #09090b; color: #e4e4e7; padding: 2rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
        nav { display: flex; gap: 1rem; margin-bottom: 2rem; }
        a { color: #34d399; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .form-card { background: #18181b; border: 1px solid #27272a; border-radius: 0.75rem; padding: 1.5rem; max-width: 600px; }
        label { display: block; margin-bottom: 1rem; }
        .label-text { display: block; font-size: 0.875rem; color: #a1a1aa; margin-bottom: 0.25rem; }
        input, textarea { width: 100%; background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-family: inherit; font-size: 0.875rem; }
        textarea { min-height: 200px; font-family: monospace; }
        input:focus, textarea:focus { outline: none; border-color: #34d399; }
        button { background: #34d399; color: #09090b; border: none; border-radius: 0.5rem; padding: 0.625rem 1.5rem; font-size: 0.875rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
        button:hover { background: #6ee7b7; }
        .result { margin-top: 1rem; padding: 0.75rem; background: #052e16; border: 1px solid #34d399; border-radius: 0.5rem; font-size: 0.875rem; display: none; }
    </style>
</head>
<body>
    <h1>Custom World Generation</h1>
    <nav>
        <a href="/admin">Dashboard</a>
        <a href="/admin/orders">All Orders</a>
        <a href="/admin/generate">Custom Generate</a>
    </nav>

    <div class="form-card">
        <label>
            <span class="label-text">Label / Email</span>
            <input type="text" id="email" value="admin@grandterrain.local" />
        </label>
        <label>
            <span class="label-text">Config JSON (paste full config or leave defaults)</span>
            <textarea id="config">{
  "terrain": { "mountainHeightScale": 5.0, "continentalScale": 1.0, "erosionStrength": 1.0, "seaLevel": 128, "worldHeight": 1024 },
  "caves": { "caveDensity": 1.0, "caveFrequency": 1.0, "enableMegaCaverns": true, "enableUndergroundRivers": true, "cavernCenterY": -100 },
  "rivers": { "riverWidth": 1.0, "riverDepth": 1.0 },
  "climate": { "snowLineBase": 400, "biomeBlendWidth": 4, "climateBlendWidth": 0.05 },
  "biomeThresholds": { "deepOceanOffset": -60, "coastalOffset": -20, "lowlandOffset": 10 },
  "structures": { "enableCastles": true, "enableRuins": true, "enableDungeons": true, "enableWatchtowers": true }
}</textarea>
        </label>
        <label>
            <span class="label-text">Notes</span>
            <input type="text" id="notes" placeholder="Internal notes..." />
        </label>
        <button onclick="generate()">Generate World</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        async function generate() {
            const password = prompt('Admin password:');
            if (!password) return;
            try {
                const config = JSON.parse(document.getElementById('config').value);
                const res = await fetch('/admin/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + password,
                    },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        config: config,
                        notes: document.getElementById('notes').value || null,
                    }),
                });
                const data = await res.json();
                const el = document.getElementById('result');
                el.style.display = 'block';
                el.textContent = 'Order created: ' + data.order_id + ' — Status: ' + data.status;
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }
    </script>
</body>
</html>
